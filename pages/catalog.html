<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Каталог</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="../assets/logo.svg">
</head>
<body class="page_catalog">
    <header>
        <a href="../index.html">
            <img src="../assets/logo.svg" alt="Главная">
        </a>
        <button><a href="../pages/about.html">О нас</a></button>
        <button><a href="../pages/delivery.html">Доставка</a></button>
        <button><a href="../pages/assorti.html">Ассорти</a></button>
        <button><a href="../pages/catalog.html">Каталог</a></button>
        <button><a href="../pages/events.html">События</a></button>
        <button><a href="../pages/news.html">Новости</a></button>
    </header>
    
    <div class="catalog">
        <div class="container" id="container_1_catalog">
            <div class="text_block" id="text_block_1.1_catalog">
                <div class="filter-group">
                    <h3>Тип блюда</h3>
                    <label class="checkbox-label">
                        <input type="checkbox" class="custom-checkbox">
                        <span class="checkmark"></span>
                        Боулы
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" class="custom-checkbox">
                        <span class="checkmark"></span>
                        Соки
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" class="custom-checkbox">
                        <span class="checkmark"></span>
                        Десерты
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" class="custom-checkbox">
                        <span class="checkmark"></span>
                        Смузи
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" class="custom-checkbox">
                        <span class="checkmark"></span>
                        Салаты
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" class="custom-checkbox">
                        <span class="checkmark"></span>
                        Добавки
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" class="custom-checkbox">
                        <span class="checkmark"></span>
                        Фрукты с собой
                    </label>
                </div>
    
                <div class="filter-group">
                    <h3>Тип перекуса</h3>
                    <label class="checkbox-label">
                        <input type="checkbox" class="custom-checkbox">
                        <span class="checkmark"></span>
                        Завтрак
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" class="custom-checkbox">
                        <span class="checkmark"></span>
                        После тренировки
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" class="custom-checkbox">
                        <span class="checkmark"></span>
                        Десерт
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" class="custom-checkbox">
                        <span class="checkmark"></span>
                        В дорогу
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" class="custom-checkbox">
                        <span class="checkmark"></span>
                        Лёгкий ужин
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" class="custom-checkbox">
                        <span class="checkmark"></span>
                        Перекус между учебой
                    </label>
                </div>
    
                <div class="filter-group">
                    <h3>Особенности</h3>
                    <label class="checkbox-label">
                        <input type="checkbox" class="custom-checkbox">
                        <span class="checkmark"></span>
                        Без сахара
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" class="custom-checkbox">
                        <span class="checkmark"></span>
                        Без лактозы
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" class="custom-checkbox">
                        <span class="checkmark"></span>
                        Без глютена
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" class="custom-checkbox">
                        <span class="checkmark"></span>
                        Халяль
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" class="custom-checkbox">
                        <span class="checkmark"></span>
                        Веган
                    </label>
                </div>
            </div>
        </div>
        
        <div class="container" id="container_2_catalog">
            <h1>Каталог</h1>
            <div class="container" id="container_2.1_catalog">
                <div class="container" id="container_2.1.1_catalog">
                    <div class="block" id="block_2.1.1.1_catalog"></div>
                    <div class="block" id="block_2.1.1.2_catalog"></div>
                </div>
                <div class="container" id="container_2.1.2_catalog">
                    <div class="block" id="block_2.1.2.1_catalog"></div>
                    <div class="block" id="block_2.1.2.2_catalog"></div>
                </div>
            </div>
            <div class="container" id="container_2.2_catalog">
                <div class="container" id="container_2.2.1_catalog">
                    <div class="block" id="block_2.2.1.1_catalog"></div>
                    <div class="block" id="block_2.2.1.2_catalog"></div>
                </div>
                <div class="container" id="container_2.2.2_catalog">
                    <div class="block" id="block_2.2.2.1_catalog"></div>
                    <div class="block" id="block_2.2.2.2_catalog"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
